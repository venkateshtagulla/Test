version: '3.8'

services:
  # DynamoDB Local for database operations
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: arka-dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    networks:
      - arka-local

  # LocalStack for S3 and other AWS services
  localstack:
    image: localstack/localstack:latest
    container_name: arka-localstack
    ports:
      - "4566:4566"            # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=s3
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PERSISTENCE=1
    volumes:
      - localstack-data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - arka-local

  # DynamoDB Admin UI (optional - for viewing tables)
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: arka-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      - dynamodb-local
    networks:
      - arka-local

volumes:
  dynamodb-data:
    driver: local
  localstack-data:
    driver: local

networks:
  arka-local:
    driver: bridge
