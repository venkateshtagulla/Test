    events:
      - http:
          path: vessels
          method: post
          cors: true

  listVessels:
    handler: routers/lambda/vessel.list_vessels_handler
    events:
      - http:
          path: vessels
          method: get
          cors: true

  getVessel:
    handler: routers/lambda/vessel.get_vessel_handler
    events:
      - http:
          path: vessels/{vessel_id}
          method: get
          cors: true

  createVesselAssignment:
    handler: routers/lambda/vessel.create_vessel_assignment_handler
    events:
      - http:
          path: vessels/assignments
          method: post
          cors: true

  getVesselAssignments:
    handler: routers/lambda/vessel.get_vessel_assignments_handler
    events:
      - http:
          path: vessels/assignments
          method: get
          cors: true

  createInspectionForm:
    handler: routers/lambda/inspection_form.create_inspection_form_handler
    events:
      - http:
          path: forms
          method: post
          cors: true

  getInspectionForm:
    handler: routers/lambda/inspection_form.get_inspection_form_handler
    events:
      - http:
          path: forms/{form_id}
          method: get
          cors: true

  updateInspectionForm:
    handler: routers/lambda/inspection_form.update_inspection_form_handler
    events:
      - http:
          path: forms/{form_id}
          method: put
          cors: true

  deleteInspectionForm:
    handler: routers/lambda/inspection_form.delete_inspection_form_handler
    events:
      - http:
          path: forms/{form_id}
          method: delete
          cors: true

  listInspectionForms:
    handler: routers/lambda/inspection_form.list_inspection_forms_handler
    events:
      - http:
          path: forms
          method: get
          cors: true

  listSubmittedForms:
    handler: routers/lambda/inspection_form.list_submitted_forms_handler
