service: arka-inspector-auth

provider:
  name: aws
  runtime: python3.12
  region: ${env:AWS_REGION}
  timeout: 28 # 28 seconds (API Gateway REST API limit is 29s, leaving 1s buffer)
  memorySize: 512 # 512MB memory for better performance with file uploads
  apiGateway:
    binaryMediaTypes:
      - "*/*"
  environment:
    DYNAMODB_TABLE_INSPECTORS: ${env:DYNAMODB_TABLE_INSPECTORS}
    DYNAMODB_TABLE_ADMINS: ${env:DYNAMODB_TABLE_ADMINS}
    DYNAMODB_TABLE_VESSELS: ${env:DYNAMODB_TABLE_VESSELS}
    DYNAMODB_TABLE_INSPECTION_FORMS: ${env:DYNAMODB_TABLE_INSPECTION_FORMS}
    DYNAMODB_TABLE_INSPECTION_ASSIGNMENTS: ${env:DYNAMODB_TABLE_INSPECTION_ASSIGNMENTS}
    DYNAMODB_TABLE_CREW: ${env:DYNAMODB_TABLE_CREW}
    DYNAMODB_TABLE_DEFECTS: ${env:DYNAMODB_TABLE_DEFECTS}
    DYNAMODB_TABLE_VESSEL_ASSIGNMENTS: ${env:DYNAMODB_TABLE_VESSEL_ASSIGNMENTS}
    S3_MEDIA_BUCKET: ${env:S3_MEDIA_BUCKET}
    JWT_SECRET_KEY: ${env:JWT_SECRET_KEY}
    JWT_ALGORITHM: ${env:JWT_ALGORITHM, "HS256"}
    ACCESS_TOKEN_EXPIRE_MINUTES: ${env:ACCESS_TOKEN_EXPIRE_MINUTES, 1440}
    REFRESH_TOKEN_EXPIRE_MINUTES: ${env:REFRESH_TOKEN_EXPIRE_MINUTES, 43200}
    DYNAMODB_TABLE_INSPECTION_RESPONSES: ${env:DYNAMODB_TABLE_INSPECTION_RESPONSES}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:Scan
        - dynamodb:Query
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
        - dynamodb:BatchWriteItem
        - s3:PutObject
        - s3:GetObject
        - s3:DeleteObject
      Resource:
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTORS}
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTORS}/index/email_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_ADMINS}
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_ADMINS}/index/email_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_VESSELS}
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_VESSELS}/index/admin_id_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTION_FORMS}
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTION_FORMS}/index/vessel_id_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTION_FORMS}/index/inspector_id_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTION_FORMS}/index/admin_id_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTION_ASSIGNMENTS}
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTION_ASSIGNMENTS}/index/admin_id_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTION_ASSIGNMENTS}/index/form_id_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTION_ASSIGNMENTS}/index/assignee_id_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_CREW}
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_CREW}/index/email_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_DEFECTS}
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_VESSEL_ASSIGNMENTS}
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_VESSEL_ASSIGNMENTS}/index/assignment_id_index
        - arn:aws:dynamodb:${env:AWS_REGION}:*:table/${env:DYNAMODB_TABLE_INSPECTION_RESPONSES}
        - arn:aws:s3:::${env:S3_MEDIA_BUCKET}
        - arn:aws:s3:::${env:S3_MEDIA_BUCKET}/*

functions:
  registerInspector:
    handler: routers/lambda/auth.register_handler
    events:
      - http:
          path: inspectors/register
          method: post
          cors: true
  loginInspector:
    handler: routers/lambda/auth.login_handler
    events:
      - http:
          path: inspectors/login
          method: post
          cors: true
  inspectorProfile:
    handler: routers/lambda/auth.profile_handler
    events:
      - http:
          path: inspectors/{inspector_id}
          method: get
          cors: true
  inspectorMe:
    handler: routers/lambda/auth.inspector_me_handler
    events:
      - http:
          path: inspector/me
          method: get
          cors: true
  inspectorDashboard:
    handler: routers/lambda/auth.inspector_dashboard_handler
    events:
      - http:
          path: inspectors/dashboard
          method: get
          cors: true
  inspectorSync:
    handler: routers/lambda/auth.inspector_sync_handler
    events:
      - http:
          path: inspectors/sync
          method: post
          cors: true

  registerAdmin:
    handler: routers/lambda/admin_auth.admin_register_handler
    events:
      - http:
          path: admins/register
          method: post
          cors: true

  loginAdmin:
    handler: routers/lambda/admin_auth.admin_login_handler
    events:
      - http:
          path: admins/login
          method: post
          cors: true

  adminProfile:
    handler: routers/lambda/admin_auth.admin_profile_handler
