          method: get
          cors: true

  listInspectionAssignments:
    handler: routers/lambda/inspection_assignment.list_inspection_assignments_handler
    events:
      - http:
          path: inspection-assignments
          method: get
          cors: true

  listInspectorAssignments:
    handler: routers/lambda/inspection_assignment.list_inspector_assignments_handler
    events:
