          cors: true

  listCrewAssignments:
    handler: routers/lambda/inspection_assignment.list_crew_assignments_handler
    events:
      - http:
          path: crew/assignments
          method: get
          cors: true

  deleteInspectionAssignment:
    handler: routers/lambda/inspection_assignment.delete_inspection_assignment_handler
    events:
      - http:
          path: inspection-assignments/form/{form_id}
          method: delete
          cors: true

  createCrew:
    handler: routers/lambda/crew.create_crew_handler
    events:
      - http:
          path: crew
          method: post
          cors: true

  getCrew:
    handler: routers/lambda/crew.get_crew_handler
    events:
      - http:
