          method: post
          cors: true

  createInspectionAssignment:
    handler: routers/lambda/inspection_assignment.create_inspection_assignment_handler
    events:
      - http:
          path: inspection-assignments
          method: post
          cors: true

  bulkCreateInspectionAssignment:
    handler: routers/lambda/inspection_assignment.bulk_create_inspection_assignment_handler
    events:
      - http:
