          path: crew/login
          method: post
          cors: true
  crewMe:
    handler: routers/lambda/crew.crew_me_handler
    events:
      - http:
          path: crew/me
          method: get
          cors: true
  crewDashboard:
    handler: routers/lambda/crew.crew_dashboard_handler
    events:
      - http:
          path: crew/dashboard
          method: get
          cors: true
  crewSync:
    handler: routers/lambda/crew.crew_sync_handler
    events:
      - http:
          path: crew/sync
          method: post
          cors: true

  adminCreateInspector:
    handler: routers/lambda/admin_inspector.admin_create_inspector_handler
    events:
      - http:
          path: admin/inspectors
          method: post
          cors: true

  adminGetInspector:
    handler: routers/lambda/admin_inspector.admin_get_inspector_handler
    events:
      - http:
          path: admin/inspectors/{inspector_id}
          method: get
          cors: true

  adminListInspectors:
    handler: routers/lambda/admin_inspector.admin_list_inspectors_handler
    events:
      - http:
          path: admin/inspectors
          method: get
          cors: true

  adminResetInspectorPassword:
    handler: routers/lambda/admin_inspector.admin_reset_inspector_password_handler
    events:
      - http:
          path: admin/inspectors/{inspector_id}/reset-password
          method: post
          cors: true

  adminDeleteInspector:
    handler: routers/lambda/admin_inspector.admin_delete_inspector_handler
    events:
      - http:
          path: admin/inspectors/{inspector_id}
          method: delete
          cors: true

  listDefects:
    handler: routers/lambda/defect.list_defects_handler
    events:
      - http:
          path: admin/defects
          method: get
          cors: true

  getDefect:
    handler: routers/lambda/defect.get_defect_handler
    events:
      - http:
          path: admin/defects/{defect_id}
          method: get
          cors: true

  approveDefect:
    handler: routers/lambda/defect.approve_defect_handler
    events:
      - http:
          path: admin/defects/{defect_id}/approve
          method: post
          cors: true

  closeDefect:
    handler: routers/lambda/defect.close_defect_handler
    events:
      - http:
          path: admin/defects/{defect_id}/close
          method: post
          cors: true

  addDefectComment:
    handler: routers/lambda/defect.add_comment_handler
    events:
      - http:
          path: admin/defects/{defect_id}/comments
          method: post
          cors: true

  updateDefect:
    handler: routers/lambda/defect.update_defect_handler
    events:
      - http:
          path: admin/defects/{defect_id}
          method: put
          cors: true

  createInspectorDefect:
    handler: routers/lambda/defect.create_inspector_defect_handler
    events:
      - http:
          path: inspectors/defects
          method: post
          cors: true

  listInspectorDefects:
    handler: routers/lambda/defect.list_inspector_defects_handler
    events:
      - http:
          path: inspectors/defects
          method: get
          cors: true

  createCrewDefect:
    handler: routers/lambda/defect.create_crew_defect_handler
    events:
      - http:
          path: crew/defects
          method: post
          cors: true

  listCrewDefects:
    handler: routers/lambda/defect.list_crew_defects_handler
    events:
      - http:
          path: crew/defects
          method: get
          cors: true

  addInspectorDefectAnalysis:
    handler: routers/lambda/defect.add_inspector_defect_analysis_handler
    events:
      - http:
          path: inspectors/defects/{defect_id}/analysis
          method: post
          cors: true

  addCrewDefectAnalysis:
    handler: routers/lambda/defect.add_crew_defect_analysis_handler
    events:
      - http:
          path: crew/defects/{defect_id}/analysis
          method: post
          cors: true

  getDashboard:
    handler: routers/lambda/dashboard.get_dashboard_handler
    events:
      - http:
          path: admin/dashboard
          method: get
          cors: true

plugins:
  - serverless-python-requirements
  - serverless-prune-plugin
  # - serverless-dotenv-plugin

custom:
  pythonRequirements:
    dockerizePip: true
    pythonBin: python3.12
    dockerImage: public.ecr.aws/sam/build-python3.12:latest-x86_64
    slim: false
    strip: false
    invalidateCaches: true
  prune:
    automatic: true
    number: 3
  dotenv:
    include:
      - DYNAMODB_TABLE_INSPECTORS
      - DYNAMODB_TABLE_VESSELS
      - DYNAMODB_TABLE_INSPECTION_FORMS
      - DYNAMODB_TABLE_INSPECTION_ASSIGNMENTS
      - DYNAMODB_TABLE_ADMINS
      - DYNAMODB_TABLE_CREW
      - DYNAMODB_TABLE_DEFECTS
      - DYNAMODB_TABLE_VESSEL_ASSIGNMENTS
      - DYNAMODB_TABLE_INSPECTION_RESPONSES
      - S3_MEDIA_BUCKET
      - JWT_SECRET_KEY
      - JWT_ALGORITHM
      - ACCESS_TOKEN_EXPIRE_MINUTES
      - REFRESH_TOKEN_EXPIRE_MINUTES
      - S3_MEDIA_BUCKET

resources:
  Resources:
    InspectionResponsesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:DYNAMODB_TABLE_INSPECTION_RESPONSES}
        AttributeDefinitions:
          - AttributeName: inspection_id
            AttributeType: S
          - AttributeName: question_id
            AttributeType: S
        KeySchema:
          - AttributeName: inspection_id
            KeyType: HASH
          - AttributeName: question_id
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST

    InspectorsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:DYNAMODB_TABLE_INSPECTORS}
        AttributeDefinitions:
          - AttributeName: inspector_id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: inspector_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email_index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

    VesselsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:DYNAMODB_TABLE_VESSELS}
        AttributeDefinitions:
          - AttributeName: vessel_id
            AttributeType: S
          - AttributeName: admin_id
            AttributeType: S
        KeySchema:
          - AttributeName: vessel_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: admin_id_index
            KeySchema:
              - AttributeName: admin_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

    InspectionFormsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:DYNAMODB_TABLE_INSPECTION_FORMS}
        AttributeDefinitions:
          - AttributeName: form_id
            AttributeType: S
          - AttributeName: vessel_id
            AttributeType: S
          - AttributeName: assigned_inspector_id
            AttributeType: S
          - AttributeName: created_by_admin_id
            AttributeType: S
        KeySchema:
          - AttributeName: form_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: vessel_id_index
            KeySchema:
              - AttributeName: vessel_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: inspector_id_index
            KeySchema:
              - AttributeName: assigned_inspector_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: admin_id_index
            KeySchema:
              - AttributeName: created_by_admin_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

    InspectionAssignmentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:DYNAMODB_TABLE_INSPECTION_ASSIGNMENTS}
        AttributeDefinitions:
          - AttributeName: assignment_id
            AttributeType: S
          - AttributeName: created_by_admin_id
            AttributeType: S
          - AttributeName: form_id
            AttributeType: S
          - AttributeName: assignee_id
            AttributeType: S
        KeySchema:
          - AttributeName: assignment_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: admin_id_index
            KeySchema:
              - AttributeName: created_by_admin_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: form_id_index
            KeySchema:
              - AttributeName: form_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: assignee_id_index
            KeySchema:
              - AttributeName: assignee_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

    AdminsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:DYNAMODB_TABLE_ADMINS}
        AttributeDefinitions:
          - AttributeName: admin_id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: admin_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email_index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

    CrewTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:DYNAMODB_TABLE_CREW}
        AttributeDefinitions:
          - AttributeName: crew_id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: crew_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email_index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

    DefectsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:DYNAMODB_TABLE_DEFECTS}
        AttributeDefinitions:
          - AttributeName: defect_id
            AttributeType: S
        KeySchema:
          - AttributeName: defect_id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    VesselAssignmentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${env:DYNAMODB_TABLE_VESSEL_ASSIGNMENTS}
        AttributeDefinitions:
          - AttributeName: vessel_id
            AttributeType: S
          - AttributeName: assignment_id
            AttributeType: S
        KeySchema:
          - AttributeName: vessel_id
            KeyType: HASH
          - AttributeName: assignment_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: assignment_id_index
            KeySchema:
              - AttributeName: assignment_id
                KeyType: HASH
            Projection:
              ProjectionType: KEYS_ONLY
        BillingMode: PAY_PER_REQUEST
